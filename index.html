<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Ledger | Soil Intelligence Terminal</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header class="ticker-tape">
        <div id="ticker-data">LOADING ACCU MARKET DATA...</div>
    </header>

    <main class="dashboard-grid">
        <section class="card">
            <h2 class="card-title">Geospatial Command Map</h2>
            <div id="map-container" style="height: 500px; width: 100%; border-radius: 4px;"></div>
        </section>

        <aside class="sidebar">
            <div class="card">
                <h2 class="card-title">Issuance Ledger</h2>
                <ul id="ledger-list" class="data-list">
                    <li>Connecting to Database...</li>
                </ul>
            </div>

            <div class="card">
                <h2 class="card-title">Methodology Split</h2>
                <canvas id="methodology-chart" style="max-height: 250px;"></canvas>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
